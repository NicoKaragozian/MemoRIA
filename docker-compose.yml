services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./memoria-q4.gguf:/models/memoria.gguf:ro
      - ./Modelfile:/Modelfile:ro
    command: >
      sh -c "ollama serve &
             until curl -sf http://localhost:11434/api/tags >/dev/null 2>&1; do sleep 1; done &&
             ollama create memoria -f /Modelfile &&
             wait"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags | grep -q memoria"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=memoria
      - CORS_ORIGINS=http://localhost:8000
    depends_on:
      ollama:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000

volumes:
  ollama_data:
